<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Página Inicial</title>
</head>
<body>

    <p>Olá pessoal!</p>
    <p>Exemplo de Parágrafo</p>

    <p><strong>Texto em Negrito</strong></p>
    <p><em>Texto em Itálico</em></p>
    <p><ins>Texto com Sublinhado</ins></p>

    <h2>Lista sem coordenação (Não Ordenada)</h2>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <h2>Lista Ordenada</h2>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>

</body>
</html>
