<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>CSS</title>
    <link rel="stylesheet" href="css05.css"/>
</head>
<body>

    <p>Olá pessoal!</p>
    <p>Exemplo de Parágrafo</p>

    <b>Texto em Negrito</b><br>
    <i>Texto em Itálico</i><br>
    <u>Texto com Sublinhado</u><br><br>

    <ul>
        <li style="color: rgb(241, 15, 139);">Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <b>Lista Ordenada</b><br>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>

    <br>
    <p>Texto formatado com CSS</p>

</body>
</html>
